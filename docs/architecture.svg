<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 730" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#222831"/></marker>
    <marker id="at" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f7b8a"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b5532a"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#b8860b"/></marker>
    <style>
      .box{fill:#fff;stroke:#222831;stroke-width:1.6}
      .gold{fill:#fdecc8;stroke:#b8860b;stroke-width:2}
      .paid{fill:#fbeee7;stroke:#b5532a;stroke-width:1.8}
      .teal{fill:#eaf5f7;stroke:#0f7b8a;stroke-width:1.6}
      .h{font-size:17px;font-weight:700;fill:#16181d}
      .s{font-size:12.5px;fill:#566069}
      .zt{font-size:15px;font-weight:700;letter-spacing:.09em}
      .lb{font-size:12px;fill:#3a4654}
      .lbp{font-size:12px;fill:#b5532a;font-weight:700}
      .e{stroke:#222831;stroke-width:1.7;fill:none}
      .ep{stroke:#b5532a;stroke-width:2;fill:none}
      .eg{stroke:#b8860b;stroke-width:2;fill:none;stroke-dasharray:6 5}
    </style>
  </defs>

  <text x="840" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#16181d">Aqueduct — System Overview</text>
  <text x="840" y="64" text-anchor="middle" font-size="14.5" fill="#566069">any dataset → a metered Tap that agents query, and pay for per row</text>

  <!-- ===== BUILD zone ===== -->
  <rect x="34" y="92" width="466" height="560" rx="16" fill="#fff8ee" stroke="#e3b873" stroke-width="1.5"/>
  <text x="58" y="124" class="zt" fill="#b07b14">BUILD</text>
  <text x="58" y="143" class="s" fill="#b07b14">once, by the data publisher</text>

  <rect class="box" x="62" y="168" width="410" height="62" rx="9"/>
  <text x="267" y="195" text-anchor="middle" class="h">Data source</text>
  <text x="267" y="216" text-anchor="middle" class="s">CSV · Parquet · JSON</text>
  <path class="e" d="M267,230 L267,266" marker-end="url(#a)"/>
  <text x="277" y="252" class="lb">onboard</text>

  <rect class="box" x="62" y="268" width="410" height="74" rx="9"/>
  <text x="267" y="296" text-anchor="middle" class="h">Profile &amp; price</text>
  <text x="267" y="317" text-anchor="middle" class="s">infer the schema, the query interface,</text>
  <text x="267" y="333" text-anchor="middle" class="s">and the price per row</text>
  <path class="e" d="M267,342 L267,378" marker-end="url(#a)"/>

  <rect class="box" x="62" y="380" width="410" height="62" rx="9"/>
  <text x="267" y="407" text-anchor="middle" class="h">Validate</text>
  <text x="267" y="428" text-anchor="middle" class="s">checked against the real data</text>
  <path class="e" d="M267,442 L267,478" marker-end="url(#a)"/>

  <rect class="gold" x="62" y="480" width="410" height="72" rx="9"/>
  <text x="267" y="510" text-anchor="middle" class="h">Tap config — frozen</text>
  <text x="267" y="531" text-anchor="middle" class="s">the one artifact the runtime runs</text>

  <!-- ===== SERVE zone ===== -->
  <rect x="532" y="92" width="1114" height="560" rx="16" fill="#edf6f8" stroke="#7cc2cd" stroke-width="1.5"/>
  <text x="558" y="124" class="zt" fill="#0c6c79">SERVE</text>
  <text x="558" y="143" class="s" fill="#0c6c79">every request — fast, deterministic</text>

  <!-- agent -->
  <rect class="box" x="566" y="162" width="420" height="64" rx="9"/>
  <text x="776" y="190" text-anchor="middle" class="h">Agent + wallet</text>
  <text x="776" y="211" text-anchor="middle" class="s">connects via MCP or the aqueduct skill</text>

  <!-- registry -->
  <rect class="box" x="1404" y="162" width="216" height="64" rx="9"/>
  <text x="1512" y="190" text-anchor="middle" class="h">Registry</text>
  <text x="1512" y="211" text-anchor="middle" class="s">find a Tap</text>
  <path class="e" d="M986,194 L1398,194" marker-end="url(#a)"/>
  <text x="1192" y="185" text-anchor="middle" class="lb">discover · free</text>

  <!-- server container -->
  <rect x="566" y="282" width="1054" height="232" rx="12" fill="#fbfdfd" stroke="#0f7b8a" stroke-width="1.6"/>
  <text x="588" y="310" class="zt" font-size="15" fill="#0c6c79">TAP SERVER</text>

  <rect class="paid" x="588" y="326" width="322" height="166" rx="9"/>
  <text x="749" y="372" text-anchor="middle" class="h" fill="#9e3f1c">Pay per row</text>
  <text x="749" y="397" text-anchor="middle" class="s">MPP payment session</text>
  <text x="749" y="415" text-anchor="middle" class="s">(a signed voucher per request,</text>
  <text x="749" y="431" text-anchor="middle" class="s">on a Tempo channel)</text>

  <rect class="teal" x="932" y="326" width="322" height="166" rx="9"/>
  <text x="1093" y="372" text-anchor="middle" class="h" fill="#0c6c79">Query → DuckDB</text>
  <text x="1093" y="397" text-anchor="middle" class="s">a safe, declared query</text>
  <text x="1093" y="415" text-anchor="middle" class="s">(no raw SQL) returns just</text>
  <text x="1093" y="431" text-anchor="middle" class="s">the rows asked for</text>

  <rect class="teal" x="1276" y="326" width="322" height="166" rx="9"/>
  <text x="1437" y="372" text-anchor="middle" class="h" fill="#0c6c79">Cache</text>
  <text x="1437" y="397" text-anchor="middle" class="s">repeat queries</text>
  <text x="1437" y="415" text-anchor="middle" class="s">served in &lt;100 ms</text>

  <!-- inner flow -->
  <path class="e" d="M910,409 L928,409" marker-end="url(#a)"/>
  <path class="e" d="M1254,409 L1272,409" marker-end="url(#a)"/>

  <!-- agent <-> server -->
  <path class="ep" d="M700,226 L700,322" marker-end="url(#ap)"/>
  <text x="690" y="262" text-anchor="end" class="lbp">query · pay</text>
  <text x="690" y="278" text-anchor="end" class="s">(schema is free)</text>
  <path class="e" d="M860,282 L860,226" marker-end="url(#a)"/>
  <text x="872" y="258" class="lb">rows</text>

  <!-- config -> server seam -->
  <path class="eg" d="M474,516 C520,516 520,409 582,409" marker-end="url(#ag)"/>
  <text x="520" y="436" text-anchor="middle" class="lb" fill="#b07b14">deploy</text>

  <!-- settlement -->
  <rect class="paid" x="588" y="544" width="322" height="76" rx="9"/>
  <text x="749" y="575" text-anchor="middle" class="h" fill="#9e3f1c">Settle on Tempo</text>
  <text x="749" y="597" text-anchor="middle" class="s">on close · non-custodial</text>

  <rect class="box" x="932" y="544" width="322" height="76" rx="9"/>
  <text x="1093" y="575" text-anchor="middle" class="h">Publisher wallet</text>
  <text x="1093" y="597" text-anchor="middle" class="s">paid per row</text>

  <path class="ep" d="M749,492 L749,540" marker-end="url(#ap)"/>
  <text x="759" y="524" class="lbp">settle</text>
  <path class="ep" d="M910,582 L928,582" marker-end="url(#ap)"/>

  <!-- legend -->
  <g transform="translate(566,646)">
    <rect x="0" y="-12" width="17" height="13" class="paid" rx="2"/><text x="24" y="-1" class="s">payment (MPP · Tempo)</text>
    <rect x="220" y="-12" width="17" height="13" class="gold" rx="2"/><text x="244" y="-1" class="s">the frozen Tap config</text>
    <line x1="430" y1="-5" x2="460" y2="-5" class="eg" marker-end="url(#ag)"/><text x="468" y="-1" class="s">build → serve handoff</text>
  </g>
</svg>
